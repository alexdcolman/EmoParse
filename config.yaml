models:
  phi4-mini: # default para metadata (stage más rápido, no requiere razonamiento complejo)
    backend: llama_cpp
    path: ${EMOPARSE_MODELS_DIR:-models}/phi-4-mini-instruct-Q4_K_M.gguf
    context_length: 4096
    n_gpu_layers: -1
    temperature: 0.0
    max_tokens: 1024
    seed: 42

  qwen3-14b: # default para stages rápidos
    backend: llama_cpp
    path: ${EMOPARSE_MODELS_DIR:-models}/qwen3-14b-q4_k_m.gguf
    context_length: 8192
    n_gpu_layers: -1
    temperature: 0.2  # bajado de 0.6 por errores con batch_size=1
#    top_k: 40
#    top_p: 0.95
#    min_p: 0.0
    presence_penalty: 0.0
    max_tokens: 4096
    seed: 42

  qwen3-30b-moe: # default para summarizer (stage más lento, requiere razonamiento complejo)
    backend: llama_cpp
    path: ${EMOPARSE_MODELS_DIR:-models}/qwen3-30b-a3b-q4_k_m.gguf
    context_length: 8192
    n_gpu_layers: -1
    temperature: 0.6
#    top_k: 20
#    top_p: 0.95
#    min_p: 0.0
#    presence_penalty: 1.5  # reduce repeticiones en modo no-thinking
    max_tokens: 2048
    seed: 42

  mistral-small-24b: # inferencia conservadora, alta precisión en emociones pero más falsos negativos. El mejor en detección de experienciador.
    backend: llama_cpp
    path: ${EMOPARSE_MODELS_DIR:-models}/Mistral-Small-3.1-24B-Instruct-2503-Q4_K_M.gguf
    context_length: 8192
    n_gpu_layers: -1
    temperature: 0.3  # Mistral recomienda explícitamente temperature baja
#    top_k: -1          # sin restricción de top_k (Mistral no lo requiere)
#    top_p: 1.0
    max_tokens: 4096
    seed: 42

  gemma3-27b: # tarda más que qwen3-14b y mistral-small-24b, sobre-detecta emociones (muchos falsos positivos) y peor experienciador con diferencia
    backend: llama_cpp
    path: ${EMOPARSE_MODELS_DIR:-models}/gemma-3-27b-it-Q4_K_M.gguf
    context_length: 8192
    n_gpu_layers: -1
    temperature: 1.0  # Google recomienda temp=1.0 para toda la familia Gemma 3/4
#    top_k: 64
#    top_p: 0.95
#    min_p: 0.0
    max_tokens: 4096
    seed: 42
    flash_attn: true

  qwen3-32b: # Muchos falsos positivos en emociones.
    backend: llama_cpp
    path: ${EMOPARSE_MODELS_DIR:-models}/Qwen3-32B-Q4_K_M.gguf
    context_length: 8192
    n_gpu_layers: -1
    temperature: 0.2  # bajado; es razonador: usá /no_think o vigilá thinking vs GBNF
#    top_k: 20
#    top_p: 0.8
#    min_p: 0.0
    no_think: true   # Qwen3 razonador bajo GBNF: saltea el thinking
    presence_penalty: 0.0
    max_tokens: 4096
    seed: 42

  gemma4-31b: # Lento, pero el mejor modelo de detección de emociones por el momento.
    backend: llama_cpp
    path: ${EMOPARSE_MODELS_DIR:-models}/gemma-4-31B-it-Q4_K_M.gguf
    context_length: 4096 # Bajado porque está al límite de VRAM.
    n_gpu_layers: -1
    temperature: 1.0  # Google recomienda temp=1.0 para Gemma 4
#    top_k: 64
#    top_p: 0.95
#    min_p: 0.0
    max_tokens: 2048
    seed: 42
    flash_attn: true    # Gemma iSWA con V heterogéneo entre capas

  gpt-oss-20b: # Falla. El formato harmony + GBNF estricto es mala combinación
    backend: llama_cpp
    path: ${EMOPARSE_MODELS_DIR:-models}/gpt-oss-20b-Q4_K_M.gguf
    context_length: 8192
    n_gpu_layers: -1
    temperature: 1.0  # OpenAI recomienda temp=1.0, top_p=1.0
#    top_p: 1.0
    max_tokens: 4096
    seed: 42

  qwen3.5-35b-a3b: # Tipa bien emociones pero sobre-detecta amplio.
    backend: llama_cpp
    path: ${EMOPARSE_MODELS_DIR:-models}/Qwen3.5-35B-A3B-Q4_K_M.gguf
    context_length: 8192
    n_gpu_layers: -1
    temperature: 0.6  # thinking mode; para no-thinking bajar a 0.7/top_p=0.8
#    top_k: 20
#    top_p: 0.95
#    min_p: 0.0
    presence_penalty: 0.0
    max_tokens: 4096
    seed: 42

  qwen3.6-27b: # El más lento hasta ahora, y peor que qwen3-14b.
    backend: llama_cpp
    path: ${EMOPARSE_MODELS_DIR:-models}/Qwen3.6-27B-Q4_K_M.gguf
    context_length: 8192
    n_gpu_layers: -1
    temperature: 0.6  # thinking mode; ajustar a 0.7 si se usa no-thinking
#    top_k: 20
#    top_p: 0.95
#    min_p: 0.0
    no_think: true
    presence_penalty: 0.0
    max_tokens: 4096
    seed: 42

  qwen3.6-35b-a3b: # El más rápido de todos. Mejor detección de experienciador + precisión máxima + buen tipado.
      backend: llama_cpp
      path: ${EMOPARSE_MODELS_DIR:-models}/Qwen3.6-35B-A3B-UD-Q4_K_M.gguf
      context_length: 8192
      n_gpu_layers: -1
      temperature: 0.3        # non-thinking preset (coherente con no_think: true)
      top_p: 0.8              # non-thinking preset
      top_k: 20
      min_p: 0.0
      no_think: true
      presence_penalty: 0.0   # se deja en 0
      max_tokens: 3072        
      seed: 42

pipeline:
  stages:
    summarizer:             qwen3-30b-moe
    metadata:               phi4-mini
    enunciation:            gemma4-31b
    actors:                 gemma4-31b
    emotions:               gemma4-31b
    emotions_pass2:         qwen3.6-35b-a3b
    deixis:                 gemma4-31b
    modalidad:              gemma4-31b
    semas:                  gemma4-31b
    characterizer:          gemma4-31b
    actants:                gemma4-31b
    judge:                  qwen3.6-35b-a3b
  cache_enabled: true
  max_retries: 3
  retry_delays_seconds: [2, 8, 15]
  timeout_seconds: 90

paths:
  runs_dir:      ${EMOPARSE_RUNS_DIR:-runs}
  models_dir:    ${EMOPARSE_MODELS_DIR:-models}
  knowledge_dir: ${EMOPARSE_KNOWLEDGE_DIR:-knowledge}
  inputs_dir:    ${EMOPARSE_INPUTS_DIR:-data}

versions:
  knowledge: v9
  prompt:    v34
  ontology:  v17
  schema:    v26

logging:
  level: INFO
  log_to_file: true
  rotation: 10 MB
  retention: 7 days

notes: |
  Run de producción. Bumpear versions cuando cambien:
    - knowledge:  datos base del proyecto.
    - prompt:     templates de los agentes.
    - ontology:   archivos JSON de knowledge/.
    - schema:     schemas Pydantic de salida.
