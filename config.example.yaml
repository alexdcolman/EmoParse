# ══════════════════════════════════════════════════════════════════════════════
#  EmoParse — config.example.yaml
#
#  Template comentado con todos los campos disponibles. Copialo a
#  `config.yaml` y ajustalo para tu setup.
#
#  Cualquier valor puede usar referencias a variables de entorno con
#  la sintaxis $ {VAR} o $ {VAR:-default}. Útil para no hardcodear paths.
# ══════════════════════════════════════════════════════════════════════════════


# ──────────────────────────────────────────────────────────────────────────────
#  models
#
#  Diccionario de alias → configuración del modelo. Cada alias se
#  referencia desde `pipeline.stages` para asignar modelos a etapas.
#
#  Backends soportados:
#  - llama_cpp: GGUFs locales, llama-cpp-python.
#  - lmstudio: API OpenAI-compatible expuesta por LM Studio. En este caso, en
#    lugar de `path`, usar `base_url`.
# ──────────────────────────────────────────────────────────────────────────────

models:
  qwen3-14b:
    backend: llama_cpp
    # Path al GGUF. Relativo al CWD o absoluto.
    path: ${EMOPARSE_MODELS_DIR:-models}/qwen3-14b-q4_k_m.gguf
    # Tamaño del context window. Subir solo si tus prompts lo requieren
    # (más context = más VRAM).
    context_length: 8192
    # -1 = todas las layers a GPU. 0 = solo CPU. Valor intermedio = split.
    n_gpu_layers: -1
    # 0.0 = greedy (determinístico). Qwen3 recomienda 0.6 para razonamiento.
    temperature: 0.6
    max_tokens: 2048
    # Seed del sampler. Cambiar solo para explorar variaciones.
    seed: 42

  # Modelo más chico, útil para etapas con schemas simples.
  phi4-mini:
    backend: llama_cpp
    path: ${EMOPARSE_MODELS_DIR:-models}/phi-4-mini-instruct-q4_k_m.gguf
    context_length: 4096
    n_gpu_layers: -1
    temperature: 0.0
    max_tokens: 1024
    seed: 42

  # Ejemplo con LM Studio (descomentar si usás).
  # mi-modelo-lmstudio:
  #   backend: lmstudio
  #   base_url: http://localhost:1234/v1
  #   model_name: nombre_del_modelo_en_lmstudio
  #   temperature: 0.0
  #   max_tokens: 2048


# ──────────────────────────────────────────────────────────────────────────────
#  pipeline
#
#  Asignación de etapa → alias de modelo. La clave de cada entrada
#  debe matchear un nombre de etapa del pipeline.
#
#  Etapas disponibles (en orden de ejecución):
#
#    Activas por defecto:
#      summarizer, metadata, enunciation, actors, emotions,
#      explode_emociones, normalize_emotions, characterizer.
#
#    Opcionales (se declaran acá para asignarles modelo, pero solo
#    se ejecutan si se piden con `--stages` en la CLI):
#      emotions_pass2, deixis, semas, actants, judge.
#
#  Las etapas `explode_emociones` y `normalize_emotions` son internas
#  (sin LLM) y no requieren modelo asignado.
# ──────────────────────────────────────────────────────────────────────────────

pipeline:
  stages:
    summarizer:      qwen3-14b
    metadata:        phi4-mini
    enunciation:     qwen3-14b
    actors:          qwen3-14b
    emotions:        qwen3-14b
    characterizer:   qwen3-14b

    # ── Etapas opcionales ─────────────────────────────────────────────
    # Declararlas acá deja el modelo asignado, pero NO se ejecutan por
    # default. Para correrlas, pasarlas en `--stages` al invocar
    # `emoparse run` (junto con sus dependencias).

    # Segunda lectura de emociones con contexto de las frases previas.
    emotions_pass2:  qwen3-14b

    # Resolución de marcas deícticas (yo/nosotros/veamos…) a los referentes
    # concretos del discurso (enunciador, auditorio, colectivo de
    # identificación). Requiere `enunciation` corrido previamente.
    deixis:          qwen3-14b

    # Asignación de semas a actores, experienciadores y fuentes.
    semas:         qwen3-14b

    # Análisis actancial de cada emoción: mediador, verificadores y
    # operador de modificación.
    actants:         qwen3-14b

    # Un segundo modelo evalúa la coherencia de las caracterizaciones.
    judge:           qwen3-14b

  # Si false, los backends no se envuelven con CachedBackend. Útil
  # solo para benchmarks; en producción dejar siempre true.
  cache_enabled: true

  max_retries: 3
  retry_delays_seconds: [2, 8, 15]
  timeout_seconds: 90


# ──────────────────────────────────────────────────────────────────────────────
#  paths
#
#  Directorios del proyecto. Se resuelven relativos al CWD donde corras
#  `emoparse run`. Recomendable usar variables de entorno para evitar
#  hardcodear rutas absolutas.
# ──────────────────────────────────────────────────────────────────────────────

paths:
  runs_dir:      ${EMOPARSE_RUNS_DIR:-runs}
  models_dir:    ${EMOPARSE_MODELS_DIR:-models}
  knowledge_dir: ${EMOPARSE_KNOWLEDGE_DIR:-knowledge}
  inputs_dir:    ${EMOPARSE_INPUTS_DIR:-data}


# ──────────────────────────────────────────────────────────────────────────────
#  versions
#
#  Strings opacos que invalidan el cache LLM de forma selectiva. El
#  cache de cada respuesta se indexa, entre otras cosas, por estos
#  valores: si cambiás algo que afecta la salida del modelo pero no
#  subís el número correspondiente, el sistema devolverá respuestas
#  cacheadas anteriores al cambio.
#
#  Subir (bump) es manual. Criterio por número:
#
#    knowledge — Subir cuando cambian datos base que afectan a todo el
#                pipeline de forma transversal. Es el menos frecuente.
#
#    prompt    — Subir cuando cambia CÓMO se le pide algo al modelo:
#                  · plantillas de prompt de cualquier agente, o
#                  · archivos de heurísticas por agente.
#
#    ontology  — Subir cuando cambian los datos semióticos de
#                referencia: ontología de emociones, archivo de
#                configuraciones emocionales, base de actores conocidos,
#                o cualquier otro JSON de datos del proyecto.
#
#    schema    — Subir cuando cambia la ESTRUCTURA de salida que se le
#                exige al modelo: los esquemas de datos (por ejemplo, al
#                agregar o quitar campos de una etapa).
#
#  Regla práctica: si tocaste un archivo de prompt o heurística, subí
#  `prompt`. Si tocaste un JSON de knowledge, subí `ontology`. Si
#  cambiaste la forma de un esquema de salida, subí `schema`. Ante la
#  duda, subir de más solo cuesta recomputar cache (correcto y seguro);
#  subir de menos deja resultados viejos mezclados con nuevos.
# ──────────────────────────────────────────────────────────────────────────────

versions:
  knowledge: v1
  prompt:    v1
  ontology:  v1
  schema:    v1


# ──────────────────────────────────────────────────────────────────────────────
#  logging
# ──────────────────────────────────────────────────────────────────────────────

logging:
  level: INFO          # DEBUG | INFO | WARNING | ERROR
  log_to_file: true
  rotation: 10 MB
  retention: 7 days


# ──────────────────────────────────────────────────────────────────────────────
#  notes
#
#  Texto libre que se guarda en runs.notes de la DB. Útil para describir
#  qué intentás con este run.
# ──────────────────────────────────────────────────────────────────────────────

notes: |
  Ejemplo: "Análisis de discursos presidenciales 2024 con qwen3-14b.
  Versión inicial — subir el número de prompt si cambian los prompts
  o las heurísticas."
